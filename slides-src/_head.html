<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Bouwen met AI. Samen beter. — CEDA Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap">
<style>
:root {
  --blue:#3D68EC; --blue-light:#D6E2FD;
  --orange:#DD784B; --orange-light:#FFE4D8;
  --black:#0a0a0a;
  --yellow:#F4D74B; --yellow-light:#FCF5D4;
  --pink:#F4D9DC;
  --green:#00AF81; --green-light:#CCEEE6;
  --paper:#FBFAF7;
  --sans:'General Sans',Arial,sans-serif;
  --voice:'Fraunces',serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#050505;font-family:var(--sans);overflow:hidden;}
.viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#050505;}
.frame{position:relative;width:1920px;height:1080px;overflow:hidden;transform-origin:center center;}
.track{position:absolute;top:0;left:0;width:1920px;transition:transform .65s cubic-bezier(.65,0,.35,1);}
.slide{width:1920px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;}

/* MARK */
.mark{position:absolute;width:54px;height:54px;}
.mark svg{width:100%;height:100%;}

/* TYPE */
.kicker{font-family:var(--sans);font-weight:600;font-size:20px;letter-spacing:.18em;text-transform:uppercase;opacity:.65;}
.h1{font-family:var(--sans);font-weight:700;font-size:88px;line-height:1.03;letter-spacing:-.01em;}
.h2{font-family:var(--sans);font-weight:700;font-size:64px;line-height:1.05;letter-spacing:-.01em;}
.body{font-family:var(--sans);font-weight:400;font-size:26px;line-height:1.55;}
.quote{font-family:var(--voice);font-style:italic;font-weight:300;font-size:52px;line-height:1.3;}
.bullets{list-style:none;}
.bullets li{font-family:var(--sans);font-weight:500;font-size:28px;line-height:1.5;padding-left:32px;position:relative;margin-bottom:20px;}
.bullets li::before{content:"";position:absolute;left:0;top:13px;width:14px;height:14px;border-radius:50%;}
.bullets.blue li::before{background:var(--blue);}
.bullets.orange li::before{background:var(--orange);}
.bullets.green li::before{background:var(--green);}

/* ========== COVER ANIMATIONS ========== */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes drift1 {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50%     { transform:translateY(-18px) rotate(4deg); }
}
@keyframes drift2 {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50%     { transform:translateY(-12px) rotate(-3deg); }
}
@keyframes driftCirc {
  0%,100% { transform:translateY(0); }
  50%     { transform:translateY(-10px); }
}
@keyframes breathe {
  0%,100% { transform:scale(1);   opacity:.88; }
  50%     { transform:scale(1.06);opacity:1;   }
}
@keyframes fadeUpDim {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:.32; transform:translateY(0); }
}
@keyframes slowSpin {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}
@keyframes slowSpinR {
  from { transform:rotate(0deg); }
  to   { transform:rotate(-360deg); }
}

/* ========== COVER ========== */
#s0{background:var(--blue);color:#fff;justify-content:center;align-items:flex-start;padding:0 140px;}
#s0 .tri1{position:absolute;width:0;height:0;border-left:130px solid transparent;border-right:130px solid transparent;border-bottom:220px solid var(--green);top:-40px;right:220px;opacity:.9;animation:drift1 7s ease-in-out infinite;}
#s0 .tri2{position:absolute;width:0;height:0;border-left:90px solid transparent;border-right:90px solid transparent;border-bottom:150px solid var(--yellow);top:150px;right:120px;opacity:.9;animation:drift2 9s ease-in-out infinite 1s;}
#s0 .circ1{position:absolute;width:170px;height:170px;background:var(--orange);border-radius:50%;bottom:-60px;right:340px;animation:driftCirc 8s ease-in-out infinite 2s;}
#s0 .s0-brand{position:absolute;top:68px;left:140px;animation:fadeUp .5s ease both .08s;}
#s0 .npuls-logo{width:210px;height:auto;color:#fff;display:block;}
#s0 .ceda-label{font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:8px;}
#s0 .kicker{color:rgba(255,255,255,.7);margin-bottom:26px;animation:fadeUp .6s ease both .2s;}
#s0 .h1{color:#fff;font-size:108px;max-width:1100px;line-height:.95;animation:fadeUp .7s ease both .35s;}
#s0 .h1 em{color:var(--yellow);font-style:normal;}
#s0 .quote{color:var(--yellow);margin-top:34px;animation:fadeUp .6s ease both .55s;}
#s0 .footer-row{position:absolute;bottom:70px;left:140px;display:flex;gap:14px;align-items:center;animation:fadeUp .6s ease both .7s;}
#s0 .footer-row span{font-family:var(--sans);font-weight:500;font-size:17px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;}
#s0 .footer-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.25);}

/* ========== DIVIDERS ========== */
.divider{justify-content:center;align-items:flex-start;padding:0 140px;color:#fff;}
.divider .num{font-family:var(--voice);font-style:italic;font-weight:300;font-size:220px;line-height:1;opacity:.28;position:absolute;top:120px;right:140px;}
.divider .kicker{margin-bottom:24px;}
.divider .h1{max-width:1100px;}

#s1{background:var(--black);}
#s1 .kicker{color:var(--yellow);}
#s1 .h1{color:#fff;}
.s1l1{display:inline-block;animation:fadeUp .7s ease both .4s;}
.s1l2{display:inline-block;animation:fadeUpDim .9s ease both 1.3s;}
#s1 .arc1{position:absolute;right:350px;bottom:160px;width:280px;height:280px;border:6px solid transparent;border-top-color:rgba(244,215,75,.45);border-right-color:rgba(244,215,75,.45);border-bottom-color:rgba(244,215,75,.18);border-radius:50%;animation:slowSpin 18s linear infinite;}
#s1 .arc2{position:absolute;right:290px;bottom:100px;width:400px;height:400px;border:3px solid transparent;border-top-color:rgba(244,215,75,.1);border-left-color:rgba(244,215,75,.1);border-radius:50%;animation:slowSpinR 28s linear infinite;}

#s8{background:var(--orange);}
#s8 .kicker{color:rgba(0,0,0,.55);}
#s8 .h1{color:#fff;}
#s8 .circ{position:absolute;width:500px;height:500px;border:3px solid rgba(255,255,255,.12);border-radius:50%;bottom:-200px;left:80px;}

#s11{background:var(--green);}
#s11 .kicker{color:rgba(0,0,0,.55);}
#s11 .h1{color:#fff;}
#s11 .tri{position:absolute;width:0;height:0;border-left:180px solid transparent;border-right:180px solid transparent;border-bottom:300px solid rgba(0,0,0,.07);bottom:0;right:280px;}

#s13{background:var(--blue);}
#s13 .kicker{color:var(--yellow);}
#s13 .h1{color:#fff;}
#s13 .circ{position:absolute;width:420px;height:420px;border:3px solid rgba(255,255,255,.1);border-radius:50%;bottom:-140px;right:200px;}
#s13 .circ2{position:absolute;width:260px;height:260px;border:3px solid rgba(255,255,255,.08);border-radius:50%;bottom:-60px;right:340px;}

/* ========== CONTENT SLIDES ========== */
.content{background:var(--paper);padding:110px 140px;justify-content:flex-start;}
.content .mark{top:64px;right:140px;}
.content .kicker{color:var(--blue);margin-bottom:16px;}
.pivot{font-family:var(--voice);font-style:italic;font-weight:300;font-size:36px;color:var(--black);opacity:.55;margin-bottom:28px;}
.content .h2{color:var(--black);margin-bottom:46px;max-width:1300px;}
.footline{position:absolute;bottom:60px;left:140px;font-family:var(--sans);font-weight:500;font-size:18px;color:#8a8880;}

/* Split cards */
.split{display:flex;gap:56px;}
.card{flex:1;background:#fff;border-radius:28px;padding:46px;border:2px solid rgba(10,10,10,.08);}
.card .cardtitle{font-family:var(--sans);font-weight:700;font-size:32px;margin-bottom:8px;}
.card .cardsub{font-family:var(--sans);font-weight:600;font-size:17px;letter-spacing:.1em;text-transform:uppercase;color:rgba(10,10,10,.3);margin-bottom:20px;}
.card .body{font-size:22px;color:#4a4a48;line-height:1.6;}
.card.maker{border-top:10px solid var(--orange);}
.card.architect{border-top:10px solid var(--blue);}
.card.open{border-top:10px solid var(--green);}

/* Mech row */
.mechrow{display:flex;gap:32px;}
.mech{flex:1;background:#fff;border-radius:22px;padding:36px 30px;border:2px solid rgba(10,10,10,.08);}
.mech .dot{width:18px;height:18px;border-radius:50%;margin-bottom:18px;}
.mech .mtitle{font-family:var(--sans);font-weight:700;font-size:26px;margin-bottom:10px;}
.mech .mbody{font-family:var(--sans);font-weight:400;font-size:19px;color:#6a6a68;line-height:1.5;}

/* Domain grid */
.domain-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;}
.dcell{background:#fff;border-radius:18px;padding:28px 26px;border:2px solid rgba(10,10,10,.07);}
.dcell .dnum{font-family:var(--voice);font-style:italic;font-size:19px;color:rgba(10,10,10,.2);margin-bottom:8px;}
.dcell .dname{font-family:var(--sans);font-weight:700;font-size:23px;color:var(--black);margin-bottom:8px;}
.dcell .dbody{font-family:var(--sans);font-weight:400;font-size:17px;color:#7a7a78;line-height:1.5;}

/* Tool columns */
.toolcols{display:flex;gap:64px;}
.toolcol{flex:1;}
.tcolyear{font-family:var(--voice);font-style:italic;font-size:38px;color:rgba(10,10,10,.22);margin-bottom:18px;}
.chips{display:flex;flex-wrap:wrap;gap:10px;}
.chip{font-family:var(--sans);font-weight:600;font-size:20px;padding:10px 18px;border-radius:8px;background:#fff;border:1.5px solid rgba(10,10,10,.1);color:#3a3a38;}
.chip.dim{opacity:.4;}

/* Pill row */
.pillrow{display:flex;gap:14px;flex-wrap:wrap;max-width:1400px;}
.pill{font-family:var(--sans);font-weight:600;font-size:20px;padding:12px 24px;border-radius:999px;border:2px solid rgba(10,10,10,.15);background:#fff;color:#3a3a38;}

/* Anchor quote */
.aq{border-radius:32px;padding:72px 92px;max-width:1380px;}
.aq .quote{color:var(--black);}

/* Moment slide */
@keyframes s7-dot-wave{0%,55%,100%{color:rgba(255,255,255,.2);}27%{color:var(--orange);}}
#s7{padding:0;overflow:hidden;}
#s7 .s7-scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#s7 .s7-maar-row{display:flex;align-items:baseline;transition:transform 3.5s cubic-bezier(.4,0,.2,1);}
#s7[data-state="1"] .s7-maar-row{transform:translateY(-260px);}
#s7 .s7-maar{font-family:var(--sans);font-weight:800;font-size:200px;line-height:1;color:#fff;letter-spacing:-.04em;}
#s7 .s7-dot{font-family:var(--sans);font-weight:800;font-size:200px;line-height:1;color:rgba(255,255,255,.2);letter-spacing:-.01em;}
#s7.is-active .s7-dot:nth-child(1){animation:s7-dot-wave 1.6s ease-in-out .15s infinite;}
#s7.is-active .s7-dot:nth-child(2){animation:s7-dot-wave 1.6s ease-in-out .45s infinite;}
#s7.is-active .s7-dot:nth-child(3){animation:s7-dot-wave 1.6s ease-in-out .75s infinite;}
#s7 .s7-gif-wrap{position:absolute;bottom:-620px;left:50%;transform:translateX(-50%);transition:bottom 3.5s cubic-bezier(.4,0,.2,1);}
#s7[data-state="1"] .s7-gif-wrap{bottom:40px;}
#s7 .s7-gif{width:860px;border-radius:18px;display:block;}
.moment{background:var(--black);color:#fff;justify-content:center;align-items:flex-start;padding:0 140px;}
.moment .big{font-family:var(--sans);font-weight:700;font-size:92px;line-height:1.0;color:#fff;max-width:1400px;}
.moment .big em{color:var(--orange);font-style:normal;}
.moment .msub{font-family:var(--sans);font-weight:400;font-size:28px;color:rgba(255,255,255,.4);margin-top:44px;max-width:860px;line-height:1.65;}
.moment .mquote{font-family:var(--voice);font-style:italic;font-size:36px;color:rgba(255,255,255,.3);margin-top:48px;}

/* Multiplier links */
.linkrow{display:flex;gap:16px;flex-wrap:wrap;margin-top:56px;}
.lpill{font-family:var(--sans);font-weight:600;font-size:18px;padding:12px 22px;border:1.5px solid rgba(255,255,255,.18);color:rgba(255,255,255,.5);border-radius:8px;}

/* DOT NAV */
.dots{position:fixed;right:26px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:10;}
.dots button{width:9px;height:9px;border-radius:50%;border:none;background:rgba(255,255,255,.25);cursor:pointer;padding:0;transition:transform .2s;}
.dots button.active{background:#fff;transform:scale(1.4);}

/* ========== S2 TIJDLIJN ========== */
@keyframes drumIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
#s2{background:var(--paper);overflow:hidden;}
#s2 .tl-year-bg{position:absolute;right:80px;top:50%;transform:translateY(-52%);font-family:var(--voice);font-style:italic;font-weight:300;font-size:400px;color:rgba(0,0,0,.04);line-height:1;pointer-events:none;user-select:none;}
#s2 .tl-bar{position:absolute;top:50%;left:760px;right:180px;height:2px;background:rgba(0,0,0,.1);transform:translateY(-50%);}
#s2 .tl-dot{position:absolute;top:50%;right:180px;width:14px;height:14px;background:var(--black);border-radius:50%;transform:translateY(-50%);box-shadow:0 0 0 4px rgba(0,0,0,.06),0 0 18px rgba(0,0,0,.12);transition:right 3s cubic-bezier(.37,0,.63,1);z-index:5;}
#s2[data-state="1"] .tl-dot{right:1160px;}
#s2[data-state="2"] .tl-dot{right:180px;}
#s2 .tl-lbl{position:absolute;top:16px;font-family:var(--sans);font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:rgba(0,0,0,.25);}
#s2 .tl-lbl-l{left:0;}
#s2 .tl-lbl-r{right:0;transform:translateX(50%);}
#s2 .tl-era{position:absolute;top:88px;left:140px;font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:rgba(0,0,0,.45);opacity:0;transition:opacity .6s,color .5s;}
#s2[data-state="1"] .tl-era{opacity:1;}
#s2[data-state="2"] .tl-era{opacity:1;color:var(--blue);}
#s2 .tl-drum{position:absolute;left:140px;top:50%;transform:translateY(-50%);width:580px;height:340px;overflow:hidden;opacity:0;transition:opacity .6s;}
#s2[data-state="1"] .tl-drum,#s2[data-state="2"] .tl-drum{opacity:1;}
#s2 .tl-drum::before,#s2 .tl-drum::after{content:'';position:absolute;left:0;right:0;height:120px;z-index:1;pointer-events:none;}
#s2 .tl-drum::before{top:0;background:linear-gradient(to bottom,var(--paper),transparent);}
#s2 .tl-drum::after{bottom:0;background:linear-gradient(to top,var(--paper),transparent);}
#s2 .tl-drum-inner{position:absolute;top:0;width:100%;}
#s2 .tl-drum-item{height:68px;display:flex;align-items:center;font-family:var(--sans);font-weight:700;font-size:20px;color:rgba(0,0,0,.06);}
#s2 .tl-drum-item[data-pos="-2"],#s2 .tl-drum-item[data-pos="2"]{font-size:20px;color:rgba(0,0,0,.07);}
#s2 .tl-drum-item[data-pos="-1"],#s2 .tl-drum-item[data-pos="1"]{font-size:30px;color:rgba(0,0,0,.2);}
#s2 .tl-drum-item[data-pos="0"]{font-size:44px;color:var(--black);animation:drumIn .7s cubic-bezier(.22,1,.36,1);}
#s2[data-state="1"] .tl-drum-item[data-pos="0"]{color:var(--orange);}
#s2[data-state="2"] .tl-drum-item[data-pos="0"]{color:var(--blue);}

/* ===== S5 PARADOX — DIVERGING LINES ===== */
@keyframes drawInd{from{stroke-dashoffset:1700}to{stroke-dashoffset:0}}
#s5{background:var(--paper);}
#s5 .s5-kicker{position:absolute;top:100px;left:140px;font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);}
#s5 .s5-title{position:absolute;top:145px;left:140px;font-family:var(--sans);font-weight:700;font-size:64px;line-height:1.1;color:var(--black);}
#s5 .s5-title-2{color:var(--blue);opacity:0;transition:opacity .5s .3s;}
#s5[data-state="1"] .s5-title-2{opacity:1;}
#s5 .s5-title-3{font-size:22px;font-weight:400;font-style:italic;color:rgba(0,0,0,.35);margin-left:14px;opacity:0;transition:opacity .5s .3s;}
#s5[data-state="1"] .s5-title-3{opacity:1;}
#s5 .s5-chart{position:absolute;top:280px;left:100px;width:1680px;height:540px;overflow:visible;}
#s5 .s5-chart svg{overflow:visible;}
.s5-vel-ceil{opacity:0;}
#s5[data-state="1"] .s5-vel-ceil{opacity:1;transition:opacity .5s .3s;}
@keyframes flowVel{from{stroke-dashoffset:1700}to{stroke-dashoffset:0}}
@keyframes flowComp{from{stroke-dashoffset:1600}to{stroke-dashoffset:0}}
.s5-line-ind{stroke:var(--orange);stroke-width:5;fill:none;stroke-linecap:round;stroke-dasharray:1700;stroke-dashoffset:1700;}
#s5.is-active .s5-line-ind{animation:drawInd 1.5s cubic-bezier(.22,1,.36,1) .15s forwards;}
.s5-flow-vel{stroke:rgba(255,190,110,.7);stroke-width:9;fill:none;stroke-linecap:round;stroke-dasharray:90 1610;opacity:0;}
#s5.is-active .s5-flow-vel{opacity:1;animation:flowVel 2.4s linear 1.9s infinite;}
.s5-flow-comp{stroke:rgba(130,170,255,.7);stroke-width:9;fill:none;stroke-linecap:round;stroke-dasharray:90 1510;opacity:0;}
#s5[data-state="1"] .s5-flow-comp{opacity:1;animation:flowComp 2.4s linear 1.6s infinite;}
.s5-dot-start{fill:var(--black);opacity:0;transition:opacity .3s .1s;}
#s5.is-active .s5-dot-start{opacity:1;}
.s5-dot-ind-end{fill:var(--orange);opacity:0;transition:opacity .3s 1.5s;}
#s5.is-active .s5-dot-ind-end{opacity:1;}
.s5-lbl-ind{font-family:'General Sans',Arial,sans-serif;font-size:22px;font-weight:700;fill:var(--orange);opacity:0;transition:opacity .4s 1.6s;}
#s5.is-active .s5-lbl-ind{opacity:1;}
.s5-line-team{stroke:var(--blue);stroke-width:5;fill:none;stroke-linecap:round;stroke-dasharray:1600;stroke-dashoffset:1600;transition:stroke-dashoffset 1.3s .1s ease-out,opacity .05s;}
.s5-line-team,.s5-dot-team-end,.s5-lbl-team,.s5-gap-line,.s5-gap-tick,.s5-gap-lbl{opacity:0;}
#s5[data-state="1"] .s5-line-team{stroke-dashoffset:0;opacity:1;}
#s5[data-state="1"] .s5-dot-team-end{opacity:1;transition:opacity .3s 1.3s;}
#s5[data-state="1"] .s5-lbl-team{opacity:1;transition:opacity .4s 1.4s;}
#s5[data-state="1"] .s5-gap-line,#s5[data-state="1"] .s5-gap-tick{opacity:1;transition:opacity .5s 1s;}
#s5[data-state="1"] .s5-gap-lbl{opacity:1;transition:opacity .5s 1.1s;}

#s5 .s5-challenges{position:absolute;bottom:72px;left:140px;max-width:1100px;opacity:0;transition:opacity .5s .9s;}
#s5[data-state="1"] .s5-challenges{opacity:1;}
#s5 .s5-quote{font-family:var(--voice);font-style:italic;font-weight:300;font-size:26px;color:rgba(0,0,0,.55);line-height:1.55;margin-bottom:16px;}
#s5 .s5-attr{font-family:var(--sans);font-size:15px;font-weight:600;letter-spacing:.1em;color:rgba(0,0,0,.3);}

/* ===== S6 MEDIA CARDS ===== */
#s6{background:var(--paper);}
#s6 .s6-kicker{position:absolute;top:52px;left:120px;font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,0,0,.35);}
#s6 .s6-grid{position:absolute;top:110px;left:60px;right:60px;bottom:48px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:28px;}
@property --s6-angle{syntax:'<angle>';initial-value:0deg;inherits:false;}
@keyframes s6-border-spin{to{--s6-angle:360deg;}}
.s6-card-wrap{display:flex;border-radius:13px;padding:1.5px;opacity:0;transition:opacity .38s cubic-bezier(.22,1,.36,1);}
.s6-card-wrap--1{transition-delay:.04s;animation:s6-border-spin 9s linear -0s infinite;}
.s6-card-wrap--2{transition-delay:.10s;animation:s6-border-spin 11s linear -3s infinite;}
.s6-card-wrap--3{transition-delay:.16s;animation:s6-border-spin 8s linear -5s infinite;}
.s6-card-wrap--4{transition-delay:.22s;animation:s6-border-spin 10s linear -2s infinite;}
.s6-card-wrap--5{transition-delay:.28s;animation:s6-border-spin 12s linear -7s infinite;}
.s6-card-wrap--6{transition-delay:.34s;animation:s6-border-spin 9.5s linear -4s infinite;}
#s6.is-active .s6-card-wrap{opacity:1;}
.s6-card-wrap{background:conic-gradient(from var(--s6-angle),rgba(180,180,190,.15) 0%,rgba(150,120,220,.65) 30%,rgba(220,140,90,.55) 60%,rgba(180,180,190,.15) 100%);}
.s6-card{background:#fff;border-radius:11px;box-shadow:0 2px 6px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);overflow:hidden;display:flex;flex-direction:column;flex:1;transform:translateY(14px) scale(.97);transition:transform .38s cubic-bezier(.22,1,.36,1);}

.s6-chrome{background:#efefef;padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0;}
.s6-dots{display:flex;gap:4px;}
.s6-dot-r,.s6-dot-y,.s6-dot-g{width:9px;height:9px;border-radius:50%;}
.s6-dot-r{background:#ff5f57;}.s6-dot-y{background:#febc2e;}.s6-dot-g{background:#28c840;}
.s6-url-bar{flex:1;background:#fff;border-radius:4px;padding:3px 9px;font-family:var(--sans);font-size:11px;color:rgba(0,0,0,.4);border:1px solid rgba(0,0,0,.09);}
.s6-body{padding:20px 22px;flex:1;display:flex;flex-direction:column;gap:12px;overflow:hidden;}
.s6-tag{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-left:2px solid;padding-left:6px;flex-shrink:0;}
.s6-headline{font-family:var(--sans);font-size:22px;font-weight:700;line-height:1.25;color:var(--black);}
.s6-comment-block{background:#f6f6f6;border-radius:6px;padding:12px 14px;font-family:var(--sans);font-size:16px;color:rgba(0,0,0,.65);line-height:1.45;display:flex;gap:8px;margin-top:auto;}
.s6-comment-icon{color:#FF4500;font-weight:900;font-size:16px;flex-shrink:0;}
.s6-li-author{display:flex;gap:10px;align-items:center;flex-shrink:0;}
.s6-avatar{width:40px;height:40px;border-radius:50%;background:#0A66C2;color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.s6-li-name{font-family:var(--sans);font-size:14px;font-weight:700;color:var(--black);}
.s6-li-role{font-family:var(--sans);font-size:12px;color:rgba(0,0,0,.4);}
.s6-li-post{font-family:var(--sans);font-size:18px;font-weight:400;color:rgba(0,0,0,.7);line-height:1.5;}
.s6-byline{font-family:var(--sans);font-size:13px;color:rgba(0,0,0,.35);margin-top:auto;}

/* ===== S9 BRAIN / COMPANY OS ===== */
#s9{background:var(--paper);padding:0;overflow:hidden;}
#s9 .s9-svg{position:absolute;inset:0;width:100%;height:100%;}
.s9-brain{fill:var(--blue);opacity:.18;}
.s9-brainglow{opacity:0;}
#s9[data-state="1"] .s9-brainglow,#s9[data-state="2"] .s9-brainglow,#s9[data-state="3"] .s9-brainglow{animation:s9brainglow 2s ease-in-out infinite;}
#s9[data-state="1"] .s9-brain,#s9[data-state="2"] .s9-brain,#s9[data-state="3"] .s9-brain{animation:s9brainpulse 2s ease-in-out infinite;}
@keyframes s9brainglow{0%,100%{opacity:0;}50%{opacity:.11;}}
@keyframes s9brainpulse{0%,100%{opacity:.18;}50%{opacity:.24;}}
.s9-cline{fill:none;stroke:rgba(61,104,236,.22);stroke-width:1.5;stroke-dasharray:300;stroke-dashoffset:300;transition:stroke-dashoffset .45s ease;}
.s9-cpulse{fill:none;stroke:rgba(61,104,236,.72);stroke-width:2.5;stroke-dasharray:25 280;stroke-dashoffset:30;opacity:0;}
#s9[data-state="1"] .s9-cpulse,#s9[data-state="2"] .s9-cpulse,#s9[data-state="3"] .s9-cpulse{opacity:1;animation:s9linepulse 2.2s linear infinite;}
#s9[data-state="3"] .s9-cpulse{opacity:.08;}
#s9[data-state="3"] .cp5{opacity:1;}
.cp1{animation-delay:0s;}.cp2{animation-delay:.36s;}.cp3{animation-delay:.72s;}.cp4{animation-delay:1.08s;}.cp5{animation-delay:1.44s;}.cp6{animation-delay:1.8s;}
@keyframes s9linepulse{from{stroke-dashoffset:-200;}to{stroke-dashoffset:30;}}
.s9-nodeg{opacity:0;transition:opacity .4s ease;}
.s9-node{fill:var(--blue);}
.s9-nname{font-family:var(--sans);font-size:13px;font-weight:600;fill:white;letter-spacing:-.01em;}
.s9-os{font-family:var(--sans);font-size:36px;font-weight:800;letter-spacing:-.02em;transition:opacity .65s;}
.s9-co{fill:var(--black);opacity:.75;}
.s9-kicker{font-family:var(--sans);font-size:14px;font-weight:600;fill:rgba(10,10,10,.3);letter-spacing:.18em;}
#s9[data-state="1"] .cl1{stroke-dashoffset:0;transition-delay:0s;}
#s9[data-state="1"] .cl2{stroke-dashoffset:0;transition-delay:.1s;}
#s9[data-state="1"] .cl3{stroke-dashoffset:0;transition-delay:.2s;}
#s9[data-state="1"] .cl4{stroke-dashoffset:0;transition-delay:.3s;}
#s9[data-state="1"] .cl5{stroke-dashoffset:0;transition-delay:.4s;}
#s9[data-state="1"] .cl6{stroke-dashoffset:0;transition-delay:.5s;}
#s9[data-state="1"] .ng1{opacity:1;transition-delay:.15s;}
#s9[data-state="1"] .ng2{opacity:1;transition-delay:.28s;}
#s9[data-state="1"] .ng3{opacity:1;transition-delay:.41s;}
#s9[data-state="1"] .ng4{opacity:1;transition-delay:.54s;}
#s9[data-state="1"] .ng5{opacity:1;transition-delay:.67s;}
#s9[data-state="1"] .ng6{opacity:1;transition-delay:.80s;}
.s9-sub{fill:none;stroke:rgba(10,10,10,.18);stroke-width:1;opacity:0;transition:opacity .3s ease;}
.s9-slabel{font-family:var(--sans);font-size:12px;font-weight:500;fill:rgba(10,10,10,0);transition:fill .3s ease;}
.s9-subdot{fill:var(--blue);opacity:0;transition:opacity .3s ease;}
.s9-diagram{transition:transform .9s cubic-bezier(.65,0,.35,1);}
#s9[data-shift="1"] .s9-diagram{transform:translateX(340px);}
.s9-card{opacity:0;transition:opacity .45s ease;}
.s9-card--1{transition-delay:.05s;}
.s9-card--2{transition-delay:.25s;}
#s9[data-cards="1"] .s9-card{opacity:1;}
.s9-card-title-o{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:52px;fill:var(--orange);}
.s9-card-title-b{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:52px;fill:var(--blue);}
.s9-card-desc{font-family:'General Sans',Arial,sans-serif;font-size:11.5px;font-weight:700;fill:rgba(10,10,10,.28);letter-spacing:.14em;}
.s9-card-body{font-family:'General Sans',Arial,sans-serif;font-size:16.5px;fill:rgba(10,10,10,.62);}
.s9-card-bijv{font-family:'General Sans',Arial,sans-serif;font-size:11px;font-weight:700;fill:rgba(10,10,10,.33);letter-spacing:.1em;}
.s9-tag-bg-o{fill:var(--orange-light);}
.s9-tag-bg-b{fill:var(--blue-light);}
.s9-tag-o{font-family:'General Sans',Arial,sans-serif;font-size:13px;font-weight:600;fill:var(--orange);}
.s9-tag-b{font-family:'General Sans',Arial,sans-serif;font-size:13px;font-weight:600;fill:var(--blue);}
.s9-iconblk{opacity:0;transition:opacity .5s ease;}
.s9-iconblk--1{transition-delay:.05s;}
.s9-iconblk--2{transition-delay:.25s;}
#s9[data-icons="1"] .s9-iconblk,#s9[data-ai="1"] .s9-iconblk{opacity:1;}
.s9-iconblk-glow,.s9-aiglow{opacity:0;}
#s9[data-icons="1"] .s9-iconblk-glow{animation:s9cardglow 1.2s ease-out .05s both;}
#s9[data-ai="1"] .s9-aiglow{animation:s9cardglow 1.2s ease-out .1s both;}
.s9-icon-person{transition:opacity .35s ease;}
#s9[data-ai="1"] .s9-icon-person{opacity:0;}
.s9-icon-brain{opacity:0;transition:opacity .55s ease .15s;}
#s9[data-ai="1"] .s9-icon-brain{opacity:1;}
.s9-person-ai{opacity:0;transform-origin:595px 290px;}
#s9[data-cards="1"] .s9-person-ai{animation:s9aiappear .7s cubic-bezier(.34,1.56,.64,1) .2s both;}
@keyframes s9aiappear{from{opacity:0;transform:scale(.75);}to{opacity:1;transform:scale(1);}}
.s9-card-glow{opacity:0;}
#s9[data-cards="1"] .s9-card-glow{animation:s9cardglow 1.1s ease-out .05s both;}
@keyframes s9cardglow{0%{opacity:0;}20%{opacity:1;}100%{opacity:0;}}
#s9[data-state="2"] .s9-cline,#s9[data-state="3"] .s9-cline{stroke-dashoffset:0;transition-delay:0s;}
#s9[data-state="2"] .s9-nodeg{opacity:1;transition-delay:0s;}
#s9[data-state="2"] .sub-eng{opacity:1;}
#s9[data-state="2"] .sub-eng.s9-slabel{fill:rgba(10,10,10,.65);}
#s9[data-state="2"] .sub-prd{opacity:1;transition-delay:.15s;}
#s9[data-state="2"] .sub-prd.s9-slabel{fill:rgba(10,10,10,.65);transition-delay:.15s;}
#s9[data-state="2"] .sub-des{opacity:1;transition-delay:.3s;}
#s9[data-state="2"] .sub-des.s9-slabel{fill:rgba(10,10,10,.65);transition-delay:.3s;}
#s9[data-state="2"] .sub-dai{opacity:1;transition-delay:.45s;}
#s9[data-state="2"] .sub-dai.s9-slabel{fill:rgba(10,10,10,.65);transition-delay:.45s;}
#s9[data-state="2"] .sub-ops{opacity:1;transition-delay:.6s;}
#s9[data-state="2"] .sub-ops.s9-slabel{fill:rgba(10,10,10,.65);transition-delay:.6s;}
#s9[data-state="2"] .sub-ken{opacity:1;transition-delay:.75s;}
#s9[data-state="2"] .sub-ken.s9-slabel{fill:rgba(10,10,10,.65);transition-delay:.75s;}
#s9[data-state="3"] .s9-nodeg{opacity:.08;transition-delay:0s;}
#s9[data-state="3"] .ng4{opacity:1;}
#s9[data-state="3"] .cl1,#s9[data-state="3"] .cl2,#s9[data-state="3"] .cl3,#s9[data-state="3"] .cl4,#s9[data-state="3"] .cl6{stroke:rgba(10,10,10,.04);}
#s9[data-state="3"] .sub-des{opacity:1;}
#s9[data-state="3"] .sub-des.s9-slabel{fill:rgba(10,10,10,.65);}
#s9[data-state="3"] .sub-eng,#s9[data-state="3"] .sub-prd,#s9[data-state="3"] .sub-dai,#s9[data-state="3"] .sub-ops,#s9[data-state="3"] .sub-ken{opacity:0;}
#s9[data-state="3"] .sub-eng.s9-slabel,#s9[data-state="3"] .sub-prd.s9-slabel,#s9[data-state="3"] .sub-dai.s9-slabel,#s9[data-state="3"] .sub-ops.s9-slabel,#s9[data-state="3"] .sub-ken.s9-slabel{fill:rgba(10,10,10,0);}
#s9[data-state="2"] .s9-subdot.sub-eng,#s9[data-state="2"] .s9-subdot.sub-prd,#s9[data-state="2"] .s9-subdot.sub-des,#s9[data-state="2"] .s9-subdot.sub-dai,#s9[data-state="2"] .s9-subdot.sub-ops,#s9[data-state="2"] .s9-subdot.sub-ken{opacity:1;}

/* ===== S3 + S4 LIGHT SLIDES ===== */
#s4{background:var(--paper);}

/* ===== S3 SHINY OBJECT SYNDROME ===== */
@keyframes shine{
  0%{background-position:-200% center}
  100%{background-position:200% center}
}
#s3{background:var(--paper);overflow:hidden;}
#s3 .s3-kicker{position:absolute;top:200px;left:180px;font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(0,0,0,.3);}
#s3 .s3-title{position:absolute;top:50%;left:180px;right:180px;transform:translateY(-58%);font-family:var(--voice);font-style:italic;font-weight:300;font-size:148px;line-height:1.05;
  background:linear-gradient(105deg,var(--black) 20%,#b8a070 35%,#f0d890 42%,#fff8e0 48%,#f0d890 54%,#b8a070 60%,var(--black) 75%);
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shine 5.5s linear infinite;
  padding-bottom:24px;}
#s3 .s3-sub{position:absolute;bottom:200px;left:180px;font-family:var(--sans);font-size:22px;color:rgba(0,0,0,.35);max-width:900px;line-height:1.5;}

/* ===== S10B ROADMAP ===== */

#s10b[data-step="4"] .s10b-n1,#s10b[data-step="5"] .s10b-n1,#s10b[data-step="6"] .s10b-n1,

#s10b[data-step="2"] .s10b-line,#s10b[data-step="3"] .s10b-line,#s10b[data-step="4"] .s10b-line,
#s10b[data-step="5"] .s10b-line,#s10b[data-step="6"] .s10b-line,#s10b[data-step="7"] .s10b-line,
#s10b[data-step="8"] .s10b-line,#s10b[data-step="9"] .s10b-line,#s10b[data-step="10"] .s10b-line{stroke-dashoffset:0;}
#s10b[data-step="3"] .s10b-n2,#s10b[data-step="4"] .s10b-n2,#s10b[data-step="5"] .s10b-n2,
#s10b[data-step="6"] .s10b-n2,#s10b[data-step="7"] .s10b-n2,#s10b[data-step="8"] .s10b-n2,#s10b[data-step="9"] .s10b-n2,#s10b[data-step="10"] .s10b-n2{opacity:1;}
.s10b-audi1{opacity:0;transition:opacity .6s ease;}
#s10b[data-step="4"] .s10b-audi1{opacity:1;}
#s10b[data-step="5"] .s10b-audi1{opacity:0;}
.s10b-pmf{opacity:0;transition:opacity .5s ease .3s;}
.s10b-light{opacity:0;}
.s10b-car{opacity:0;transition:opacity .4s ease;}
#s10b[data-step="5"] .s10b-pmf,#s10b[data-step="6"] .s10b-pmf,#s10b[data-step="7"] .s10b-pmf,#s10b[data-step="8"] .s10b-pmf,#s10b[data-step="9"] .s10b-pmf,#s10b[data-step="10"] .s10b-pmf{opacity:1;}
#s10b[data-step="5"] .s10b-light,#s10b[data-step="6"] .s10b-light,#s10b[data-step="7"] .s10b-light,#s10b[data-step="8"] .s10b-light,#s10b[data-step="9"] .s10b-light,#s10b[data-step="10"] .s10b-light{animation:s10blight 1.6s ease-out .05s both;}
#s10b[data-step="5"] .s10b-car,#s10b[data-step="6"] .s10b-car,#s10b[data-step="7"] .s10b-car,#s10b[data-step="8"] .s10b-car,#s10b[data-step="9"] .s10b-car,#s10b[data-step="10"] .s10b-car{opacity:1;}
#s10b[data-step="6"] .s10b-line2,#s10b[data-step="7"] .s10b-line2,#s10b[data-step="8"] .s10b-line2,#s10b[data-step="9"] .s10b-line2,#s10b[data-step="10"] .s10b-line2{stroke-dashoffset:0;}
#s10b[data-step="7"] .s10b-n3,#s10b[data-step="8"] .s10b-n3,#s10b[data-step="9"] .s10b-n3,#s10b[data-step="10"] .s10b-n3{opacity:1;}
.s10b-audi2{opacity:0;transition:opacity .6s ease;}

.s10b-seg1,.s10b-seg2{opacity:0;transition:opacity .5s ease;}

@keyframes s10blight{0%{opacity:0;}25%{opacity:1;}100%{opacity:.75;}}
</style>
