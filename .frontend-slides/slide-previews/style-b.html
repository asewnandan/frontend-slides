<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Style B — Studio Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
.deck-viewport { position: fixed; inset: 0; overflow: hidden; background: #000; }
.deck-stage { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; overflow: hidden; transform-origin: 0 0; }
.slide { position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden; display: block; visibility: hidden; opacity: 0; pointer-events: none; }
.slide.active { visibility: visible; opacity: 1; pointer-events: auto; z-index: 1; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === THEME === */
:root {
  --bg: #000000;
  --yellow: #F4D74B;
  --orange: #DD784B;
  --text: #ffffff;
  --muted: rgba(255,255,255,0.35);
}

/* === TITLE SLIDE === */
.slide-title {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 108px;
}

/* Scanline texture */
.slide-title::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(255,255,255,0.012) 3px,
    rgba(255,255,255,0.012) 4px
  );
  pointer-events: none;
}

.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: var(--yellow);
  opacity: 0;
  animation: expandBar 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  transform-origin: left;
  transform: scaleX(0);
}

.eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeIn 0.5s ease 0.5s forwards;
}

.main-title {
  font-family: 'Syne', sans-serif;
  font-size: 148px;
  font-weight: 800;
  line-height: 0.88;
  color: var(--text);
  letter-spacing: -4px;
  margin-bottom: 52px;
  overflow: hidden;
}

.title-line {
  display: block;
  opacity: 0;
  transform: translateY(100%);
  animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.title-line:nth-child(1) { animation-delay: 0.55s; }
.title-line:nth-child(2) { animation-delay: 0.7s; color: var(--yellow); }

.divider {
  width: 80px; height: 3px;
  background: var(--orange);
  margin-bottom: 40px;
  opacity: 0;
  transform: scaleX(0);
  transform-origin: left;
  animation: expandBar 0.5s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
}

.subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 22px;
  font-weight: 400;
  color: var(--muted);
  line-height: 1.6;
  max-width: 860px;
  opacity: 0;
  animation: fadeIn 0.6s ease 1.1s forwards;
}

.bottom-row {
  position: absolute;
  bottom: 72px; left: 108px; right: 108px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  opacity: 0;
  animation: fadeIn 0.5s ease 1.3s forwards;
}

.bottom-label {
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

.year-badge {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--yellow);
  border: 2px solid var(--yellow);
  padding: 8px 20px;
  letter-spacing: 3px;
}

@keyframes fadeIn { to { opacity: 1; } }
@keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
@keyframes expandBar { to { opacity: 1; transform: scaleX(1); } }
</style>
</head>
<body>
<div class="deck-viewport">
  <div class="deck-stage" id="stage">
    <div class="slide active slide-title">
      <div class="top-bar"></div>
      <div class="eyebrow">CEDA Playbook — Npuls</div>
      <div class="main-title">
        <span class="title-line">Bouwen</span>
        <span class="title-line">met systemen.</span>
      </div>
      <div class="divider"></div>
      <div class="subtitle">Van idee naar impact — AI als multiplier,<br>het team als fundament.</div>
      <div class="bottom-row">
        <div class="bottom-label">Ash Sewnandan — Workshop</div>
        <div class="year-badge">2026</div>
      </div>
    </div>
  </div>
</div>
<script>
function scale() {
  const s = document.getElementById('stage');
  const r = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const dx = (window.innerWidth - 1920 * r) / 2;
  const dy = (window.innerHeight - 1080 * r) / 2;
  s.style.transform = `translate(${dx}px,${dy}px) scale(${r})`;
}
scale(); window.addEventListener('resize', scale);
</script>
</body>
</html>
