<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Style A — Npuls Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* === VIEWPORT BASE === */
html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #0d0d0d; }
.deck-viewport { position: fixed; inset: 0; overflow: hidden; background: #0d0d0d; }
.deck-stage { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; overflow: hidden; transform-origin: 0 0; }
.slide { position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden; display: block; visibility: hidden; opacity: 0; pointer-events: none; }
.slide.active { visibility: visible; opacity: 1; pointer-events: auto; z-index: 1; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

/* === THEME === */
:root {
  --bg: #0d0d0d;
  --card: #DD784B;
  --card-text: #0d0d0d;
  --text: #ffffff;
  --muted: rgba(255,255,255,0.45);
  --blue: #3D68EC;
  --grid: rgba(255,255,255,0.03);
}

/* === TITLE SLIDE === */
.slide-title {
  background: var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 80px 80px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 100px 88px;
}

.accent-bar {
  position: absolute;
  left: 0; top: 0;
  width: 5px; height: 100%;
  background: var(--blue);
  opacity: 0;
  animation: fadeIn 0.4s ease 0.1s forwards;
}

.top-row {
  position: absolute;
  top: 72px; left: 100px; right: 100px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  opacity: 0;
  animation: fadeIn 0.5s ease 0.2s forwards;
}

.top-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
}

.card-block {
  background: var(--card);
  display: inline-flex;
  flex-direction: column;
  padding: 44px 56px 40px;
  margin-bottom: 44px;
  width: fit-content;
  opacity: 0;
  transform: translateX(48px);
  animation: slideLeft 0.85s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
}

.card-eyebrow {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--card-text);
  opacity: 0.55;
  margin-bottom: 14px;
}

.card-title {
  font-family: 'Archivo Black', sans-serif;
  font-size: 84px;
  line-height: 0.92;
  color: var(--card-text);
  letter-spacing: -1px;
}

.subtitle {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 30px;
  font-weight: 400;
  color: var(--muted);
  margin-bottom: 36px;
  opacity: 0;
  transform: translateY(18px);
  animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.95s forwards;
}

.meta-row {
  display: flex;
  align-items: center;
  gap: 28px;
  opacity: 0;
  animation: fadeUp 0.6s ease 1.15s forwards;
}

.meta-pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--card);
}

.meta-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
  font-weight: 400;
  color: rgba(255,255,255,0.3);
  letter-spacing: 1.5px;
}

@keyframes fadeIn { to { opacity: 1; } }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
@keyframes slideLeft { to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<div class="deck-viewport">
  <div class="deck-stage" id="stage">
    <div class="slide active slide-title">
      <div class="accent-bar"></div>
      <div class="top-row">
        <div class="top-label">CEDA — Center for Educational Data Analytics</div>
        <div class="top-label">Juli 2026</div>
      </div>
      <div class="card-block">
        <div class="card-eyebrow">Playbook</div>
        <div class="card-title">Bouwen met AI.<br>Samen beter.</div>
      </div>
      <div class="subtitle">Van idee naar impact — met een systeem dat werkt.</div>
      <div class="meta-row">
        <div class="meta-pip"></div>
        <div class="meta-text">Ash Sewnandan</div>
        <div class="meta-pip"></div>
        <div class="meta-text">Workshop — 1 uur</div>
        <div class="meta-pip"></div>
        <div class="meta-text">Npuls</div>
      </div>
    </div>
  </div>
</div>
<script>
function scale() {
  const s = document.getElementById('stage');
  const r = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  const dx = (window.innerWidth - 1920 * r) / 2;
  const dy = (window.innerHeight - 1080 * r) / 2;
  s.style.transform = `translate(${dx}px,${dy}px) scale(${r})`;
}
scale(); window.addEventListener('resize', scale);
</script>
</body>
</html>
